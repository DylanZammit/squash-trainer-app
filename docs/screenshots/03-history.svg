  <text x="36" y="229" fill="#666" font-size="12">Duration</text>
  <text x="354" y="220" text-anchor="end" fill="#00C853" font-size="22" font-weight="700">05:00</text>

  <!-- ── History item 3 ── -->
  <rect x="16" y="252" width="358" height="62" rx="14" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
  <text x="36" y="278" fill="#888" font-size="14">28 Feb 2026, 10:00 AM</text>
  <text x="36" y="301" fill="#666" font-size="12">Duration</text>
  <text x="354" y="292" text-anchor="end" fill="#00C853" font-size="22" font-weight="700">10:00</text>

  <!-- ── History item 4 ── -->
  <rect x="16" y="324" width="358" height="62" rx="14" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
