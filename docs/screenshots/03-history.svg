  <text x="354" y="148" text-anchor="end" fill="#00C853" font-size="22" font-weight="700">08:45</text>

  <!-- ── History item 2 ── -->
  <rect x="16" y="180" width="358" height="62" rx="14" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
