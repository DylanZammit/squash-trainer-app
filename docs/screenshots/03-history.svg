  <text x="354" y="364" text-anchor="end" fill="#00C853" font-size="22" font-weight="700">03:22</text>

  <!-- ── History item 5 (incomplete) ── -->
  <rect x="16" y="396" width="358" height="62" rx="14" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
  <text x="36" y="422" fill="#888" font-size="14">26 Feb 2026, 4:20 PM</text>
  <text x="36" y="445" fill="#666" font-size="12">Duration</text>
