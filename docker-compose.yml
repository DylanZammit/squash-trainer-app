services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=3001
      - DB_PATH=/data/squash.db
    volumes:
      - db_data:/data

volumes:
  db_data:
